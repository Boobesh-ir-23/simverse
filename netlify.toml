# Simverse — static site on Netlify
# Docs: https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  publish = "."
  # No build step — pure HTML/CSS/JS

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Do NOT use long immutable caches on app.js/styles.css without content hashes.
# Stale JS was breaking SEPIC / Charging after deploys.
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
